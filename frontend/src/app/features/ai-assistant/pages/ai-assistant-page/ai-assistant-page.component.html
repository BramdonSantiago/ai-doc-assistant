<div class="assistant-layout">

    <app-sidebar></app-sidebar>


    <div class="workspace">

        <app-header [connectionStatus]="connectionStatus()" [responseTime]="formattedResponseTime()"></app-header>

        <app-chat-window [messages]="messages()" [isTyping]="isTyping()" [error]="error()" (retry)="retry()"></app-chat-window>

        <app-prompt-input [isTyping]="isTyping()" (sendMessage)="sendMessage($event)"></app-prompt-input>

    </div>

    <app-context-panel></app-context-panel>


</div>
