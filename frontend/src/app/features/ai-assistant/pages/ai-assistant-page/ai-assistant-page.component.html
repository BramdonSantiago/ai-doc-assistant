<div class="assistant-content">
    <div class="workspace">
        <app-header [connectionStatus]="connectionStatus()" [responseTime]="formattedResponseTime()" [selectedTask]="selectedTask()" [assistant]="currentAssistant()" (taskSelected)="selectTask($event)"></app-header>
        <div>
            <app-chat-window [messages]="messages()" [isTyping]="isTyping()" [error]="error()" (retry)="retry()" [emptyState]="currentAssistant().emptyState"></app-chat-window>
            <app-prompt-input [isTyping]="isTyping()" (sendMessage)="sendMessage($event)" [placeholder]="currentAssistant().placeholder"></app-prompt-input>
        </div>
    </div>
    <app-context-panel></app-context-panel>

</div>
